name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      CI: true
      TARGET_URL: ${{ secrets.TARGET_URL || 'https://hercules.works/ai' }}
      AUTH_EMAIL: ${{ secrets.AUTH_EMAIL || 'rajesh@jupitermeta.io' }}
      AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD || '12345678' }}
      STEP_DELAY_MS: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        timeout-minutes: 25

      - name: Run Playwright Tests
        run: npx playwright test --project=chromium --forbid-only
        timeout-minutes: 70

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
