name: Playwright Tests

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      # Set your test credentials and URL here
      TARGET_URL: ${{ secrets.TARGET_URL || 'https://hercules.works/ai' }}
      AUTH_EMAIL: ${{ secrets.AUTH_EMAIL || 'rajesh@jupitermeta.io' }}
      AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD || '12345678' }}
      CI: true
      STEP_DELAY_MS: 0

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        timeout-minutes: 25

      - name: Run Playwright Tests
        run: npx playwright test --project=chromium --forbid-only
        timeout-minutes: 45
        env:
          TARGET_URL: ${{ env.TARGET_URL }}
          AUTH_EMAIL: ${{ env.AUTH_EMAIL }}
          AUTH_PASSWORD: ${{ env.AUTH_PASSWORD }}
          STEP_DELAY_MS: ${{ env.STEP_DELAY_MS }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

