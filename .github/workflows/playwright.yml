name: Playwright Tests

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      # Set your test credentials and URL here
      TARGET_URL: ${{ secrets.TARGET_URL || 'https://hercules.works/ai' }}
      AUTH_EMAIL: ${{ secrets.AUTH_EMAIL || 'rajesh@jupitermeta.io' }}
      AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD || '12345678' }}
      CI: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright Tests
        run: npx playwright test --project=chromium
        env:
          TARGET_URL: ${{ env.TARGET_URL }}
          AUTH_EMAIL: ${{ env.AUTH_EMAIL }}
          AUTH_PASSWORD: ${{ env.AUTH_PASSWORD }}

